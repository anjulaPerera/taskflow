version: '3.8'

services:
  db:
    image: postgres:16
    container_name: taskflow_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: taskflow123
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - taskflow_data:/var/lib/postgresql/data

volumes:
  taskflow_data: